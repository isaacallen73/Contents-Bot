<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liberty Restoration — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Roboto, sans-serif;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px 40px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(0,0,0,0.10);
      text-align: center;
    }
    .logo {
      height: 56px;
      background: white;
      border-radius: 8px;
      padding: 6px 20px;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 6px; color: #1a1a1a; }
    .subtitle { color: #666; font-size: 14px; margin: 0 0 32px; }

    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .btn-google:hover {
      background: #f8f8f8;
      border-color: #bbb;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .error {
      margin-top: 20px;
      padding: 12px 16px;
      background: #fff2f2;
      border: 1px solid #fcc;
      border-radius: 6px;
      color: #c00;
      font-size: 13px;
      text-align: left;
      line-height: 1.5;
    }
    .domain-note {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/static/img/logo.jpg" alt="Liberty Restoration">
    <h1>Inventory Bot</h1>
    <p class="subtitle">Sign in with your Liberty Restoration Google account.</p>

    <a href="/login/google" class="btn-google">
      <!-- Google G logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <p class="domain-note">Access restricted to @liberty-restoration.com accounts.</p>
  </div>
</body>
</html>
